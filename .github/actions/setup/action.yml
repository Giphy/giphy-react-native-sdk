name: 'Setup'
description: 'Set up the environment and install dependencies'

inputs:
  cocoa-pods:
    description: 'Set up CocoaPods environment'
    required: false
  example-dependencies:
    default: 'true'
    description: 'Install example app JavaScript dependencies'
    required: false
  install-scripts:
    default: 'false'
    description: 'Allow package manager lifecycle scripts during dependency install'
    required: false
  jdk:
    description: 'Set up JDK environment'
    required: false
  java-version:
    default: '17'
    description: 'Java version'
    required: false
  node-version:
    default: '22'
    description: 'NodeJS version'
    required: false
  ruby-version:
    default: '3.0'
    description: 'Ruby version'
    required: false

runs:
  using: composite
  steps:
    - name: ⬢ Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: yarn
        cache-dependency-path: |
          yarn.lock
          example/yarn.lock
        registry-url: 'https://registry.npmjs.org'

    - name: 📦 Install JS dependencies
      run: |
        install_args=(--frozen-lockfile)
        if [ "${{ inputs.install-scripts }}" != "true" ]; then
          install_args+=(--ignore-scripts)
        fi

        yarn install "${install_args[@]}"

        if [ "${{ inputs.example-dependencies }}" == "true" ]; then
          yarn example install "${install_args[@]}"
        fi
      shell: bash
      env:
        HUSKY: '0'

    - name: 🛠 Setup JDK
      uses: actions/setup-java@v4
      if: inputs.jdk == 'true'
      with:
        cache: gradle
        distribution: zulu
        java-version: ${{ inputs.java-version }}

    - name: ♻️ Restore example/ios/Pods from cache
      id: pods-cache
      if: inputs.cocoa-pods == 'true'
      uses: actions/cache@v4
      with:
        key: ${{ runner.os }}-pods-${{ hashFiles('example/ios/Podfile.lock') }}
        path: example/ios/Pods

    - name: 💎 Setup Ruby
      uses: ruby/setup-ruby@v1
      if: inputs.cocoa-pods == 'true'
      with:
        bundler-cache: true
        ruby-version: ${{ inputs.ruby-version }}

    - name: ⏯ Install Pods
      if: inputs.cocoa-pods == 'true' && steps.pods-cache.outputs.cache-hit != 'true'
      run: |
        yarn example gem:install
        yarn pods
      shell: bash
